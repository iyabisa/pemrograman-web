<html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Koperasi Mahasiswa - Pendaftaran Belanja</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; max-width: 500px; margin: auto; border-radius: 8px; box-shadow: 0px 0px 10px #ccc; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="number"], select { width: 100%; padding: 8px; margin-top: 5px; }
        .checkbox-group { margin-top: 10px; background: #eee; padding: 10px; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; margin-top: 20px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Form Belanja KPMA</h2>
        <form action="proses.php" method="POST">
            <label>Nama Mahasiswa:
            </label>
            <input type="text" name="nama" required minlength="3">

            <label>NIM:</label>
            <input type="text" name="nim" required maxlength="15">

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Jenis Layanan:</label>
            <select name="layanan">
                <option value="Reguler">Reguler (Gratis)
                </option>
                <option value="Prioritas">Prioritas (Rp 5.000)
                </option>
            </select>

            <label>Pilih Alat Tulis: </label>
            <div class="checkbox-group">
                <input type="checkbox" name="barang[]" value="Buku"> Buku (Rp 5.000) 
                <input type="number" name="qty_Buku" value="0" min="0" style="width: 50px;">
                <br>
                
                <input type="checkbox" name="barang[]" value="Pulpen"> Pulpen (Rp 3.000) 
                <input type="number" name="qty_Pulpen" value="0" min="0" style="width: 50px;">
                <br>
                
                <input type="checkbox" name="barang[]" value="Pensil"> Pensil (Rp 2.000) 
                <input type="number" name="qty_Pensil" value="0" min="0" style="width: 50px;">
            </div>
            <button type="submit">Daftar & Belanja
            </button>
        </form>
    </div>
</body>
</html>
