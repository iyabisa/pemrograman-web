<html>
<head>
  <title>
    Cek Nilai Mahasiswa
  </title>
</head>
<body>
  <h2>
    Form Cek Nilai
  </h2>
  <label for="nim">NIM:
  </label>
  <input type="text" id="nim">
  <br>
  <br>
  
  <label for="nilai">Nilai:
  </label>
  <input type="number" id="nilai">
  <br>
  <br>
  <button onclick="cekNilai()">Cek Nilai
  </button>
  <br> 
  <p>Hasil: <span id="hasil">
  </span>
</p>
  
  <script>
    function cekNilai() {
      let nim = document.getElementById("nim").value;
      let nilai = document.getElementById("nilai").value;
      let hasil = "";
      if (nilai < 0 || nilai > 100 || nilai === "") {
        hasil = "Nilai tidak valid!";
      } else if (nilai >= 80 && nilai <= 100) {
        hasil = "NIM: " + nim + " → Huruf Mutu: A";
      } else if (nilai >= 70 && nilai <= 79) {
        hasil = "NIM: " + nim + " → Huruf Mutu: B";
      } else if (nilai >= 60 && nilai <= 69) {
        hasil = "NIM: " + nim + " → Huruf Mutu: C";
      } else if (nilai >= 50 && nilai <= 59) {
        hasil = "NIM: " + nim + " → Huruf Mutu: D";
      } else {
        hasil = "NIM: " + nim + " → Huruf Mutu: E";
      }
      document.getElementById("hasil").innerText = hasil;
    }
  </script>
</body>
</html>
