<html>
<head>
  <meta charset="UTF-8">
  <title>Website Sederhana
  </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Selamat Datang di Website Sederhana
    </h1>
    <nav>
      <a href="#">Beranda</a>
      <a href="#">Tentang</a>
      <a href="#">Layanan</a>
      <a href="#">Kontak</a>
    </nav>
  </header>

  <main class="container">
    <section class="formulir">
      <h2>Formulir Pendaftaran
      </h2>
      <form>
        <label>Nama Lengkap:
        </label>
        <br>
        <input type="text">
        <br>
        <br>

        <label>Email:
        </label>
        <br>
        <input type="email">
        <br>
        <br>

        <label>Password:
        </label>
        <br>
        <input type="password">
        <br>
        <br>

        <label>Jenis Kelamin
        </label>
        <br>
        <input type="radio" name="gender"> Laki-laki
        <input type="radio" name="gender"> Perempuan
        <br>
        <br>

        <label>Agama:
        </label>
        <br>
        <input type="radio" name="agama"> Islam
        <input type="radio" name="agama"> Kristen
        <input type="radio" name="agama"> Hindu
        <input type="radio" name="agama"> Budha
        <br>
        <br>

        <label>Hobi:</label>
        <br>
        <input type="text"><br>
        <br>

        <label>Pesan:</label><br>
        <textarea></textarea><br><br>

        <button type="submit" class="btn">Kirim</button>
      </form>
    </section>

    <aside class="sidebar">
      <h2>Sidebar</h2>
      <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.
      </p>
    </aside>
  </main>
</body>
</html>
